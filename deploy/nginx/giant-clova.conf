# ── CLOVA API Lab (giant/clova) — Vite SPA + Express 프록시 ──────────
# EC2 AmazonFront /etc/nginx/default.d/giant-clova.conf 로 설치됨.
# 파일 루트: /var/www/giant/clova/  (nginx root /var/www + /giant/clova/)
# 백엔드: hellcat 의 Express 가 autossh 역방향 터널로 127.0.0.1:3600 에 listen.
# 루트(/) 302→/admin/ 은 elda(admin.conf) 소유이므로 여기서 건드리지 않는다.

location /giant/clova/ {
    try_files $uri $uri/ /giant/clova/index.html;
}

# Vite 해시 에셋 — 장기 캐시(immutable)
location /giant/clova/assets/ {
    access_log off;
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
}

# 프록시: /giant/clova/api/* → 127.0.0.1:3600/api/*
location /giant/clova/api/ {
    proxy_pass http://127.0.0.1:3600/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # SSE 스트리밍: 버퍼링 끄고 즉시 flush (chat/stream 용)
    proxy_buffering off;
    proxy_cache off;
}
